<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2400" viewBox="0 0 1400 2400">
  <title>Manual de montagem detalhado - expositor 40 x 30 x 40 cm</title>
  <defs>
    <marker id="seta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111111"/>
    </marker>
    <style>
      .linha{fill:none;stroke:#111;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
      .fina{fill:none;stroke:#111;stroke-width:2;stroke-linejoin:round}
      .peca{fill:#f2f2f2;stroke:#111;stroke-width:3;stroke-linejoin:round}
      .destaque{fill:#dedede;stroke:#111;stroke-width:3;stroke-linejoin:round}
      .seta{fill:none;stroke:#111;stroke-width:3;marker-end:url(#seta)}
      .tracejada{fill:none;stroke:#555;stroke-width:2;stroke-dasharray:9 8;marker-end:url(#seta)}
      .titulo{font:700 42px Arial,sans-serif;fill:#111}
      .subtitulo{font:700 27px Arial,sans-serif;fill:#111}
      .texto{font:20px Arial,sans-serif;fill:#111}
      .pequeno{font:17px Arial,sans-serif;fill:#111}
      .rotulo{font:700 18px Arial,sans-serif;fill:#111;text-anchor:middle}
      .numero{font:700 28px Arial,sans-serif;fill:#fff;text-anchor:middle}
      .alerta{fill:#f4f4f4;stroke:#111;stroke-width:2}
    </style>
  </defs>

  <rect width="1400" height="2400" fill="#ffffff"/>
  <text x="70" y="70" class="titulo">Manual de montagem - 3 prateleiras inclinadas</text>
  <text x="70" y="108" class="texto">MDF 3 mm | largura 40 cm | altura 40 cm | base 30 cm | laterais 31 cm</text>
  <path d="M70 135 H1330" class="fina"/>

  <!-- Identificacao das pecas -->
  <circle cx="96" cy="202" r="30" fill="#111"/><text x="96" y="212" class="numero">1</text>
  <text x="145" y="198" class="subtitulo">Separe e reconheca as pecas</text>
  <text x="145" y="230" class="texto">Use o plano numerado como referencia. As letras gravadas nao fazem parte do SVG de corte limpo.</text>

  <g transform="translate(75 280)">
    <!-- Laterais -->
    <g transform="translate(0 0) scale(.43)">
      <path d="M0 400 V255 H65 V160 H130 V65 H205 V0 H310 V400 Z" class="peca"/>
      <path d="M25 383 H50 M205 383 H230 M296 45 V70 M296 190 V215 M296 335 V360" class="fina"/>
    </g>
    <text x="65" y="195" class="rotulo">L1</text>
    <g transform="translate(155 0) scale(.43)">
      <path d="M0 400 V255 H65 V160 H130 V65 H205 V0 H310 V400 Z" class="peca"/>
      <path d="M25 383 H50 M205 383 H230 M296 45 V70 M296 190 V215 M296 335 V360" class="fina"/>
    </g>
    <text x="220" y="195" class="rotulo">L2</text>

    <!-- Fundo -->
    <g transform="translate(345 0) scale(.43)">
      <path d="M0 0 H394 V45 H400 V70 H394 V190 H400 V215 H394 V335 H400 V360 H394 V400 H0 V360 H-6 V335 H0 V215 H-6 V190 H0 V70 H-6 V45 H0 Z" class="peca"/>
      <path d="M55 116.5 H75 M184 116.5 H204 M314 116.5 H334 M55 383 H75 M184 383 H204 M314 383 H334" class="fina"/>
    </g>
    <text x="430" y="195" class="rotulo">F1 - FUNDO</text>

    <!-- Base -->
    <g transform="translate(555 35) scale(.43)">
      <path d="M0 0 H394 V45 H406 V70 H394 V225 H406 V250 H394 V297 H334 V305 H314 V297 H204 V305 H184 V297 H75 V305 H55 V297 H0 V250 H-12 V225 H0 V70 H-12 V45 H0 Z" class="peca"/>
    </g>
    <text x="640" y="195" class="rotulo">B1 - BASE</text>

    <!-- Prateleiras -->
    <g transform="translate(790 40) scale(.43)">
      <path d="M0 0 H394 V25 H406 V50 H394 V110 H406 V135 H394 V160 H0 V135 H-12 V110 H0 V50 H-12 V25 H0 Z" class="peca"/>
      <path d="M55 7 H75 M184 7 H204 M314 7 H334 M55 150 H75 M184 150 H204 M314 150 H334" class="fina"/>
    </g>
    <text x="875" y="135" class="rotulo">P1 / P2</text>
    <text x="875" y="160" class="pequeno" text-anchor="middle">rasgos frente + travessa</text>

    <g transform="translate(1010 40) scale(.43)">
      <path d="M0 0 H394 V25 H406 V50 H394 V110 H406 V135 H394 V160 H334 V168 H314 V160 H204 V168 H184 V160 H75 V168 H55 V160 H0 V135 H-12 V110 H0 V50 H-12 V25 H0 Z" class="peca"/>
      <path d="M55 7 H75 M184 7 H204 M314 7 H334" class="fina"/>
    </g>
    <text x="1095" y="135" class="rotulo">P3</text>
    <text x="1095" y="160" class="pequeno" text-anchor="middle">abas traseiras para F1</text>
  </g>

  <g transform="translate(90 505)">
    <g transform="translate(0 0) scale(.55)">
      <path d="M0 0 H394 V10 H400 V30 H394 V45 H400 V65 H394 V70 H334 V78 H314 V70 H204 V78 H184 V70 H75 V78 H55 V70 H0 V65 H-6 V45 H0 V30 H-6 V10 H0 Z" class="peca"/>
    </g>
    <text x="108" y="65" class="rotulo">FR1 / FR2 / FR3 - FRENTES</text>

    <g transform="translate(410 15) scale(.55)">
      <path d="M0 0 H55 V-8 H75 V0 H184 V-8 H204 V0 H314 V-8 H334 V0 H394 V7 H400 V27 H394 V35 H0 V27 H-6 V7 H0 Z" class="peca"/>
    </g>
    <text x="518" y="65" class="rotulo">T1 / T2 - TRAVESSAS</text>

    <g transform="translate(855 10)">
      <path d="M0 0 L30 4 L30 16 L0 12 Z" class="peca"/>
      <path d="M50 0 L80 4 L80 16 L50 12 Z" class="peca"/>
      <path d="M100 0 L130 4 L130 16 L100 12 Z" class="peca"/>
      <path d="M150 0 L180 4 L180 16 L150 12 Z" class="peca"/>
    </g>
    <text x="945" y="65" class="rotulo">TR1-TR8 - CUNHAS</text>
  </g>

  <rect x="75" y="605" width="1250" height="92" rx="8" class="alerta"/>
  <text x="100" y="642" class="subtitulo">Antes de montar</text>
  <text x="100" y="675" class="texto">Corte o cupom. O encaixe correto entra com pressao leve. Nao use martelo e nao force o MDF.</text>

  <!-- Orientacao das prateleiras -->
  <circle cx="96" cy="765" r="30" fill="#111"/><text x="96" y="775" class="numero">2</text>
  <text x="145" y="760" class="subtitulo">Identifique a frente e a traseira das prateleiras</text>
  <text x="145" y="793" class="texto">Os tres rasgos a 7 mm da borda ficam na FRENTE. P1 e P2 possuem outros tres rasgos atras.</text>

  <g transform="translate(135 845)">
    <path d="M0 0 H610 V235 H0 Z" class="peca"/>
    <path d="M85 12 H125 M285 12 H325 M485 12 H525" class="linha"/>
    <path d="M85 220 H125 M285 220 H325 M485 220 H525" class="linha"/>
    <path d="M-18 38 H0 M-18 75 H0 M-18 162 H0 M-18 200 H0 M610 38 H628 M610 75 H628 M610 162 H628 M610 200 H628" class="linha"/>
    <text x="305" y="-25" class="rotulo">FRENTE: recebe FR1 ou FR2</text>
    <text x="305" y="275" class="rotulo">TRASEIRA: recebe T1 ou T2</text>
    <path d="M305 -15 V5" class="seta"/>
    <path d="M305 260 V230" class="seta"/>
  </g>
  <g transform="translate(840 845)">
    <path d="M0 0 H410 V235 H350 V247 H320 V235 H220 V247 H190 V235 H90 V247 H60 V235 H0 Z" class="peca"/>
    <path d="M55 12 H85 M190 12 H220 M325 12 H355" class="linha"/>
    <text x="205" y="-25" class="rotulo">P3: frente recebe FR3</text>
    <text x="205" y="282" class="rotulo">As 3 abas traseiras entram no fundo F1</text>
    <path d="M205 265 V242" class="seta"/>
  </g>

  <!-- Subconjuntos -->
  <circle cx="96" cy="1190" r="30" fill="#111"/><text x="96" y="1200" class="numero">3</text>
  <text x="145" y="1185" class="subtitulo">Monte os tres subconjuntos</text>
  <text x="145" y="1218" class="texto">As frentes entram nos rasgos dianteiros. As abas curtas de T1/T2 ficam niveladas apos o encaixe traseiro.</text>

  <g transform="translate(105 1285)">
    <path d="M40 120 L470 61 L510 67 L80 126 Z" class="peca"/>
    <path d="M40 30 H470 V120 H40 Z" class="destaque"/>
    <path d="M105 120 V142 H130 V120 M245 120 V142 H270 V120 M385 120 V142 H410 V120" class="linha"/>
    <path d="M470 61 V102 H510 V67" class="destaque"/>
    <text x="255" y="18" class="rotulo">FR1 + P1 + T1</text>
    <path d="M255 -25 V25" class="seta"/>
  </g>
  <g transform="translate(680 1285)">
    <path d="M40 120 L470 61 L510 67 L80 126 Z" class="peca"/>
    <path d="M40 30 H470 V120 H40 Z" class="destaque"/>
    <path d="M105 120 V142 H130 V120 M245 120 V142 H270 V120 M385 120 V142 H410 V120" class="linha"/>
    <path d="M470 61 V102 H510 V67" class="destaque"/>
    <text x="255" y="18" class="rotulo">FR2 + P2 + T2</text>
    <path d="M255 -25 V25" class="seta"/>
  </g>
  <g transform="translate(395 1500)">
    <path d="M40 120 L470 61 L510 67 L80 126 Z" class="peca"/>
    <path d="M40 30 H470 V120 H40 Z" class="destaque"/>
    <path d="M105 120 V142 H130 V120 M245 120 V142 H270 V120 M385 120 V142 H410 V120" class="linha"/>
    <path d="M470 61 L488 64 M492 64 L510 67" class="linha"/>
    <text x="255" y="18" class="rotulo">FR3 + P3 (sem travessa)</text>
  </g>

  <!-- Estrutura -->
  <circle cx="96" cy="1745" r="30" fill="#111"/><text x="96" y="1755" class="numero">4</text>
  <text x="145" y="1740" class="subtitulo">Monte a estrutura sobre a lateral L1</text>
  <text x="145" y="1773" class="texto">Deite L1 na mesa. Encaixe F1 e B1; depois P1, P2 e P3, sempre da frente para o fundo.</text>

  <g transform="translate(120 1825) scale(.72)">
    <path d="M0 400 V255 H65 V160 H130 V65 H205 V0 H310 V400 Z" class="peca"/>
    <path d="M0 385 H297" class="destaque"/>
    <path d="M10 330 L168.5 308.2" class="linha"/>
    <path d="M75 235 L233.5 213.2" class="linha"/>
    <path d="M140 140 L298.5 118.2" class="linha"/>
    <path d="M297 0 V400" class="destaque"/>
    <text x="35" y="375" class="rotulo">B1</text>
    <text x="83" y="318" class="rotulo">P1</text>
    <text x="148" y="223" class="rotulo">P2</text>
    <text x="213" y="128" class="rotulo">P3</text>
    <text x="275" y="205" class="rotulo" transform="rotate(-90 275 205)">F1</text>
  </g>

  <g transform="translate(510 1825)">
    <path d="M0 0 V285" class="linha"/>
    <path d="M0 40 H410 M0 125 H410 M0 210 H410 M0 285 H410" class="tracejada"/>
    <text x="20" y="25" class="pequeno">P3 entra tambem nos 3 rasgos de F1</text>
    <text x="20" y="110" class="pequeno">P2 apoiada por T2</text>
    <text x="20" y="195" class="pequeno">P1 apoiada por T1</text>
    <text x="20" y="270" class="pequeno">B1 entra nos rasgos inferiores de F1</text>
  </g>

  <!-- Fechamento e travas -->
  <circle cx="96" cy="2180" r="30" fill="#111"/><text x="96" y="2190" class="numero">5</text>
  <text x="145" y="2175" class="subtitulo">Feche com L2 e coloque as oito cunhas</text>
  <text x="145" y="2208" class="texto">Alinhe todos os encaixes antes de pressionar L2. Introduza a ponta estreita das cunhas e aperte apenas com a mao.</text>

  <g transform="translate(130 2250)">
    <rect x="0" y="0" width="24" height="105" class="peca"/>
    <path d="M24 37 H92 V68 H24" class="peca"/>
    <rect x="55" y="37" width="5" height="31" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M48 -8 L54 -8 L70 47 L45 47 Z" class="destaque"/>
    <path d="M58 -25 V20" class="seta"/>
    <text x="170" y="30" class="texto">1 cunha em cada lado de B1, P1, P2 e P3 = 8 cunhas.</text>
    <text x="170" y="64" class="texto">A parte mais larga fica para fora; pare quando o conjunto estiver firme.</text>
    <text x="170" y="98" class="texto">Confira o esquadro antes de usar cola opcional.</text>
  </g>

  <path d="M70 2370 H1330" class="fina"/>
  <text x="700" y="2394" class="pequeno" text-anchor="middle">Arquivos em escala 1:1 | cotas do produto em centimetros | encaixes configuraveis no gerador PowerShell</text>
</svg>
